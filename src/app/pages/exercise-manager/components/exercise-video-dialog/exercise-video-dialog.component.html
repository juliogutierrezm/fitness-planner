<h2 mat-dialog-title>{{ getFieldValue(exercise, 'name_es') || exercise.name }}</h2>
<mat-dialog-content style="text-align: center;">
  <ng-container *ngIf="getVideoSource(exercise) as video; else noVideo">
    <video
      *ngIf="video.type === 'S3'"
      [src]="getCacheBustedUrl(video.url)"
      controls
      autoplay
      muted
      style="width: 100%; max-height: 400px; margin-bottom: 1rem;">
    </video>

    <iframe
      *ngIf="video.type === 'YOUTUBE' && sanitizeYoutubeUrl(video.url)"
      [src]="sanitizeYoutubeUrl(video.url)"
      style="width: 100%; height: 320px; margin-bottom: 1rem;"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </ng-container>
  <ng-template #noVideo>
    <p>No hay video disponible para este ejercicio.</p>
  </ng-template>
  <div *ngIf="getFieldValue(exercise, 'muscle_group')" style="margin-top: 1rem;">
    <strong>{{ getFieldValue(exercise, 'muscle_group') }}</strong>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onViewDetails()" color="primary">
    <mat-icon>edit</mat-icon>
    Ver detalles
  </button>
  <button mat-button (click)="onClose()">Cerrar</button>
</mat-dialog-actions>
