<div class="main-container" [attr.aria-busy]="loading">
    <!-- Loading Spinner -->
    <div *ngIf="loading" class="loading-container" id="exercise-loading-region" aria-live="polite">
        <mat-progress-spinner diameter="48" mode="indeterminate" role="status" aria-label="Cargando ejercicios"></mat-progress-spinner>
        <p>Cargando ejercicios...</p>
    </div>

    <mat-card class="header-card">
        <mat-card-header>
          <mat-card-title>
            <mat-icon>fitness_center</mat-icon>
            Ejercicios
          </mat-card-title>
          <mat-card-subtitle>Biblioteca y gestión de ejercicios disponibles</mat-card-subtitle>
        </mat-card-header>
    </mat-card>

    <mat-card>
        <!-- Filters Component -->
        <app-exercise-filters
          [currentFilters]="currentFilters"
          [filterOptions]="filterOptions"
          [isLoading]="loading"
          [canModify]="canModifyExercises"
          (filtersChanged)="onFiltersChanged($event)"
          (createNewClicked)="onCreateNewClicked()"
          (refreshClicked)="onRefreshClicked()">
        </app-exercise-filters>

        <ng-container *ngIf="filteredExercises$ | async as exercises">
          <app-exercise-table
            *ngIf="exercises.length; else emptyState"
            [exercises]="exercises"
            [inlineCatalogs]="inlineCatalogs"
            [initialPaginatorState]="paginatorState"
            (editExercise)="onEditExercise($event)"
            (deleteExercise)="onDeleteExercise($event)"
            (openVideoPreview)="onOpenVideo($event)"
            (paginatorChanged)="onPaginatorChanged($event)">
          </app-exercise-table>
        </ng-container>

        <ng-template #emptyState>
          <div class="empty-state">
            No hay ejercicios disponibles.
          </div>
        </ng-template>
    </mat-card>
</div>
